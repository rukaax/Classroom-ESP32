; ========================================
; PlatformIO 项目配置文件
; 项目：教室环境监测系统
; 硬件：ESP32-S3 N16R8（16MB Flash + 8MB PSRAM）
; 功能：OLED菜单界面 + 旋转编码器 + 光敏/MQ135/DHT11传感器
; ========================================

[env:esp32s3]
; ---------- 开发板配置 ----------
platform = espressif32                    ; ESP32平台
board = esp32-s3-devkitc-1               ; ESP32-S3开发板
framework = arduino                       ; 使用Arduino框架

; ---------- 存储配置 ----------
board_build.arduino.partitions = default_16MB.csv  ; 16MB Flash分区表
board_build.arduino.memory_type = qio_opi          ; Flash和PSRAM均使用QIO/OPI模式
board_upload.flash_size = 16MB                     ; 上传时指定16MB Flash

; ---------- 编译选项 ----------
build_flags =
    -DBOARD_HAS_PSRAM                    ; 启用PSRAM支持
    -std=gnu++17                         ; 使用C++17标准（astra UI需要）
build_unflags = -std=gnu++11             ; 移除默认的C++11标准

; ---------- 串口监视器 ----------
monitor_speed = 115200                   ; 串口波特率115200

; ---------- 依赖库 ----------
lib_deps =
    olikraus/U8g2@^2.36.18              ; U8g2图形库（驱动SSD1306 OLED）
    adafruit/DHT sensor library@^1.4.6  ; DHT温湿度传感器库
    adafruit/Adafruit Unified Sensor@^1.1.14  ; Adafruit统一传感器抽象层（DHT库的依赖）
